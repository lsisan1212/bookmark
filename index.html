<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>我的書籤</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d1117;--panel:#161b22;--panel-2:#1f262e;--border:#30363d;
    --text:#e6edf3;--text-dim:#8b949e;--accent:#58a6ff;--accent-2:#a371f7;
    --danger:#f85149;--success:#3fb950;--warn:#d29922;
    --radius:10px;
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 60px;
  }
  header{
    position:sticky;top:0;z-index:100;
    background:rgba(13,17,23,.85);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);padding:14px 24px;
    display:flex;gap:12px;align-items:center;flex-wrap:wrap;
  }
  header h1{
    font-size:20px;font-weight:700;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    margin-right:auto;
  }
  .btn{
    background:var(--panel-2);color:var(--text);border:1px solid var(--border);
    padding:8px 14px;border-radius:var(--radius);cursor:pointer;font-size:13px;
    transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
  }
  .btn:hover{background:var(--border);border-color:var(--accent)}
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));border:none;color:#fff}
  .btn.primary:hover{opacity:.9}
  .btn.danger:hover{background:var(--danger);border-color:var(--danger);color:#fff}
  .search{
    background:var(--panel-2);border:1px solid var(--border);color:var(--text);
    padding:8px 12px;border-radius:var(--radius);width:220px;font-size:13px;
  }
  .search:focus{outline:none;border-color:var(--accent)}
  main{max-width:1400px;margin:24px auto;padding:0 24px}
  .folder{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    margin-bottom:16px;overflow:hidden;transition:all .2s;
  }
  .folder.drag-over{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent)}
  .folder-head{
    padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;
    user-select:none;background:var(--panel-2);border-bottom:1px solid var(--border);
  }
  .folder.collapsed .folder-head{border-bottom:none}
  .folder-head:hover{background:var(--border)}
  .chevron{
    transition:transform .2s;color:var(--text-dim);font-size:12px;flex-shrink:0;
  }
  .folder.collapsed .chevron{transform:rotate(-90deg)}
  .folder-icon{font-size:18px;flex-shrink:0}
  .folder-name{font-weight:600;font-size:15px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .folder-count{
    font-size:11px;color:var(--text-dim);background:var(--bg);
    padding:2px 8px;border-radius:10px;
  }
  .folder-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
  .folder-head:hover .folder-actions{opacity:1}
  .icon-btn{
    background:transparent;border:none;color:var(--text-dim);cursor:pointer;
    padding:4px 6px;border-radius:4px;font-size:14px;
  }
  .icon-btn:hover{background:var(--bg);color:var(--text)}
  .icon-btn.del:hover{color:var(--danger)}
  .folder-body{
    padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:12px;max-height:3000px;transition:max-height .3s ease,padding .3s ease,opacity .2s;
  }
  .folder.collapsed .folder-body{max-height:0;padding:0 16px;opacity:0;pointer-events:none}
  .bookmark{
    background:var(--panel-2);border:1px solid var(--border);border-radius:var(--radius);
    padding:12px;display:flex;flex-direction:column;gap:8px;cursor:pointer;
    text-decoration:none;color:var(--text);transition:all .15s;position:relative;
    min-height:100px;
  }
  .bookmark:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
  .bookmark.dragging{opacity:.4}
  .bookmark.drag-over{border-color:var(--accent);border-style:dashed}
  .bm-top{display:flex;gap:8px;align-items:flex-start}
  .bm-fav{
    width:24px;height:24px;border-radius:4px;background:var(--bg);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:12px;
    overflow:hidden;
  }
  .bm-fav img{width:100%;height:100%;object-fit:contain}
  .bm-title{
    font-size:13px;font-weight:600;line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
    overflow:hidden;flex:1;word-break:break-word;
  }
  .bm-url{
    font-size:11px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;
    white-space:nowrap;
  }
  .bm-note{font-size:11px;color:var(--text-dim);line-height:1.4;margin-top:2px}
  .bm-actions{
    position:absolute;top:6px;right:6px;display:flex;gap:2px;
    opacity:0;transition:opacity .15s;background:var(--panel);border-radius:6px;padding:2px;
  }
  .bookmark:hover .bm-actions{opacity:1}
  .empty-state{
    grid-column:1/-1;text-align:center;padding:40px;color:var(--text-dim);
    border:2px dashed var(--border);border-radius:var(--radius);
  }
  .add-bookmark{
    border:2px dashed var(--border);background:transparent;color:var(--text-dim);
    display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;
    min-height:100px;
  }
  .add-bookmark:hover{border-color:var(--accent);color:var(--accent);background:transparent;transform:none}
  /* Modal */
  .modal-bg{
    position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
    display:none;align-items:center;justify-content:center;padding:20px;
    backdrop-filter:blur(4px);
  }
  .modal-bg.show{display:flex}
  .modal{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    width:100%;max-width:480px;padding:24px;max-height:90vh;overflow-y:auto;
  }
  .modal h2{margin-bottom:16px;font-size:18px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px}
  .field input,.field textarea,.field select{
    width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);
    padding:10px;border-radius:6px;font-size:13px;font-family:inherit;
  }
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent)}
  .field textarea{resize:vertical;min-height:60px}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--panel-2);border:1px solid var(--border);padding:12px 20px;
    border-radius:var(--radius);font-size:13px;z-index:300;
    box-shadow:0 8px 24px rgba(0,0,0,.4);opacity:0;transition:opacity .2s;
  }
  .toast.show{opacity:1}
  .empty-all{
    text-align:center;padding:80px 20px;color:var(--text-dim);
  }
  .empty-all h2{color:var(--text);margin-bottom:12px}
  @media (max-width:640px){
    header{padding:10px 12px}
    .search{width:100%;order:10}
    main{padding:0 12px}
    .folder-body{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
    .folder-actions{opacity:1}
  }
</style>
</head>
<body>

<header>
  <h1>📚 我的書籤</h1>
  <input class="search" id="search" placeholder="🔍 搜尋書籤..." />
  <button class="btn primary" onclick="openFolderModal()">＋ 新資料夾</button>
  <button class="btn" onclick="expandAll()">全部展開</button>
  <button class="btn" onclick="collapseAll()">全部折疊</button>
  <button class="btn" onclick="importBrowser()">📥 匯入瀏覽器書籤</button>
  <button class="btn" onclick="exportJSON()">💾 匯出</button>
  <button class="btn" onclick="importJSON()">📂 匯入</button>
  <input type="file" id="fileInput" accept=".html,.json" hidden />
</header>

<main id="main"></main>

<!-- Folder Modal -->
<div class="modal-bg" id="folderModal">
  <div class="modal">
    <h2 id="folderModalTitle">新增資料夾</h2>
    <div class="field">
      <label>圖示（Emoji）</label>
      <input id="fIcon" maxlength="4" placeholder="📁" />
    </div>
    <div class="field">
      <label>名稱</label>
      <input id="fName" placeholder="例如：工作、學習、娛樂" />
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('folderModal')">取消</button>
      <button class="btn primary" onclick="saveFolder()">儲存</button>
    </div>
  </div>
</div>

<!-- Bookmark Modal -->
<div class="modal-bg" id="bookmarkModal">
  <div class="modal">
    <h2 id="bookmarkModalTitle">新增書籤</h2>
    <div class="field">
      <label>標題</label>
      <input id="bTitle" placeholder="網站名稱" />
    </div>
    <div class="field">
      <label>網址</label>
      <input id="bUrl" placeholder="https://" />
    </div>
    <div class="field">
      <label>備註（選填）</label>
      <textarea id="bNote" placeholder="簡短說明這個書籤的用途..."></textarea>
    </div>
    <div class="field">
      <label>所屬資料夾</label>
      <select id="bFolder"></select>
    </div>
    <div class="modal-actions">
      <button class="btn danger" id="bDeleteBtn" onclick="deleteBookmark()" style="margin-right:auto">刪除</button>
      <button class="btn" onclick="closeModal('bookmarkModal')">取消</button>
      <button class="btn primary" onclick="saveBookmark()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'bm_data_v1';
let state = { folders: [] };
let editingFolderId = null;
let editingBookmark = null; // {folderId, bookmarkId}
let searchTerm = '';

// ====== Storage ======
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
    else seedDemo();
  } catch(e) { seedDemo(); }
}
function seedDemo(){
  state = { folders: [
    { id: uid(), name: '常用', icon: '⭐', collapsed: false, bookmarks: [
      { id: uid(), title: 'Google', url: 'https://google.com', note: '' },
      { id: uid(), title: 'GitHub', url: 'https://github.com', note: '程式碼倉庫' },
      { id: uid(), title: 'YouTube', url: 'https://youtube.com', note: '' },
    ]},
    { id: uid(), name: '工作', icon: '💼', collapsed: false, bookmarks: [
      { id: uid(), title: 'Gmail', url: 'https://mail.google.com', note: '' },
    ]},
    { id: uid(), name: '學習', icon: '📖', collapsed: true, bookmarks: [] },
  ]};
  save();
}
function uid(){ return Math.random().toString(36).slice(2,10); }

// ====== Render ======
function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  const q = searchTerm.toLowerCase().trim();

  if (state.folders.length === 0) {
    main.innerHTML = `<div class="empty-all">
      <h2>📚 還沒有任何書籤</h2>
      <p>點上方的「＋ 新資料夾」開始，或匯入你的瀏覽器書籤</p>
    </div>`;
    return;
  }

  state.folders.forEach(folder => {
    let bms = folder.bookmarks;
    if (q) bms = bms.filter(b =>
      b.title.toLowerCase().includes(q) ||
      b.url.toLowerCase().includes(q) ||
      (b.note||'').toLowerCase().includes(q)
    );
    if (q && bms.length === 0 && !folder.name.toLowerCase().includes(q)) return;

    const el = document.createElement('div');
    el.className = 'folder' + (folder.collapsed ? ' collapsed' : '');
    el.dataset.folderId = folder.id;
    el.draggable = true;
    el.ondragstart = e => { e.dataTransfer.setData('type','folder'); e.dataTransfer.setData('id', folder.id); el.style.opacity='.4'; };
    el.ondragend = () => el.style.opacity='1';
    el.ondragover = e => { if (e.dataTransfer.types.includes('type')) { e.preventDefault(); el.classList.add('drag-over'); }};
    el.ondragleave = () => el.classList.remove('drag-over');
    el.ondrop = e => {
      e.preventDefault(); el.classList.remove('drag-over');
      const type = e.dataTransfer.getData('type');
      const id = e.dataTransfer.getData('id');
      if (type === 'folder' && id !== folder.id) {
        const fromIdx = state.folders.findIndex(f => f.id === id);
        const toIdx = state.folders.findIndex(f => f.id === folder.id);
        const [moved] = state.folders.splice(fromIdx, 1);
        state.folders.splice(toIdx, 0, moved);
        save(); render();
      }
    };

    el.innerHTML = `
      <div class="folder-head" onclick="toggleFolder('${folder.id}')">
        <span class="chevron">▼</span>
        <span class="folder-icon">${folder.icon || '📁'}</span>
        <span class="folder-name">${escape(folder.name)}</span>
        <span class="folder-count">${folder.bookmarks.length}</span>
        <div class="folder-actions" onclick="event.stopPropagation()">
          <button class="icon-btn" onclick="openFolderModal('${folder.id}')" title="編輯">✏️</button>
          <button class="icon-btn" onclick="openBookmarkModal('${folder.id}')" title="新增書籤">＋</button>
          <button class="icon-btn del" onclick="deleteFolder('${folder.id}')" title="刪除">🗑️</button>
        </div>
      </div>
      <div class="folder-body"></div>
    `;
    const body = el.querySelector('.folder-body');
    bms.forEach(bm => body.appendChild(renderBookmark(folder.id, bm)));
    // add bookmark button
    const addBtn = document.createElement('button');
    addBtn.className = 'bookmark add-bookmark';
    addBtn.innerHTML = '＋ 新增書籤';
    addBtn.onclick = () => openBookmarkModal(folder.id);
    body.appendChild(addBtn);
    main.appendChild(el);
  });
}

function renderBookmark(folderId, bm) {
  const a = document.createElement('a');
  a.className = 'bookmark';
  a.href = bm.url;
  a.target = '_blank';
  a.rel = 'noopener';
  a.dataset.bmId = bm.id;
  a.dataset.folderId = folderId;
  a.draggable = true;
  a.onclick = e => { if (e.detail === 2) { e.preventDefault(); openBookmarkModal(folderId, bm.id); }}; // double-click edit

  a.ondragstart = e => {
    e.stopPropagation();
    e.dataTransfer.setData('type','bookmark');
    e.dataTransfer.setData('id', bm.id);
    e.dataTransfer.setData('folderId', folderId);
    a.classList.add('dragging');
  };
  a.ondragend = () => a.classList.remove('dragging');
  a.ondragover = e => { e.preventDefault(); e.stopPropagation(); a.classList.add('drag-over'); };
  a.ondragleave = () => a.classList.remove('drag-over');
  a.ondrop = e => {
    e.preventDefault(); e.stopPropagation();
    a.classList.remove('drag-over');
    const type = e.dataTransfer.getData('type');
    if (type !== 'bookmark') return;
    const srcId = e.dataTransfer.getData('id');
    const srcFolderId = e.dataTransfer.getData('folderId');
    moveBookmark(srcFolderId, srcId, folderId, bm.id);
  };

  let host = '';
  try { host = new URL(bm.url).hostname.replace('www.',''); } catch {}
  const fav = `https://www.google.com/s2/favicons?domain=${encodeURIComponent(host||'example.com')}&sz=64`;

  a.innerHTML = `
    <div class="bm-actions">
      <button class="icon-btn" onclick="event.preventDefault();event.stopPropagation();openBookmarkModal('${folderId}','${bm.id}')" title="編輯">✏️</button>
      <button class="icon-btn del" onclick="event.preventDefault();event.stopPropagation();deleteBookmark('${folderId}','${bm.id}')" title="刪除">🗑️</button>
    </div>
    <div class="bm-top">
      <div class="bm-fav"><img src="${fav}" onerror="this.replaceWith(document.createTextNode('🔗'))" /></div>
      <div class="bm-title">${escape(bm.title)}</div>
    </div>
    <div class="bm-url">${escape(host)}</div>
    ${bm.note ? `<div class="bm-note">${escape(bm.note)}</div>` : ''}
  `;
  return a;
}

function moveBookmark(srcFolderId, srcId, dstFolderId, dstId) {
  const sf = state.folders.find(f => f.id === srcFolderId);
  const df = state.folders.find(f => f.id === dstFolderId);
  if (!sf || !df) return;
  const srcIdx = sf.bookmarks.findIndex(b => b.id === srcId);
  if (srcIdx < 0) return;
  const [bm] = sf.bookmarks.splice(srcIdx, 1);
  let dstIdx = df.bookmarks.findIndex(b => b.id === dstId);
  if (dstIdx < 0) dstIdx = df.bookmarks.length;
  if (sf === df && srcIdx < dstIdx) dstIdx--;
  df.bookmarks.splice(dstIdx, 0, bm);
  save(); render();
}

// ====== Folder actions ======
function toggleFolder(id) {
  const f = state.folders.find(x => x.id === id);
  if (!f) return;
  f.collapsed = !f.collapsed;
  save(); render();
}
function expandAll(){ state.folders.forEach(f => f.collapsed = false); save(); render(); }
function collapseAll(){ state.folders.forEach(f => f.collapsed = true); save(); render(); }

function openFolderModal(id = null) {
  editingFolderId = id;
  document.getElementById('folderModalTitle').textContent = id ? '編輯資料夾' : '新增資料夾';
  if (id) {
    const f = state.folders.find(x => x.id === id);
    document.getElementById('fIcon').value = f.icon || '';
    document.getElementById('fName').value = f.name;
  } else {
    document.getElementById('fIcon').value = '📁';
    document.getElementById('fName').value = '';
  }
  document.getElementById('folderModal').classList.add('show');
  setTimeout(() => document.getElementById('fName').focus(), 50);
}

function saveFolder() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { toast('請輸入名稱'); return; }
  const icon = document.getElementById('fIcon').value.trim() || '📁';
  if (editingFolderId) {
    const f = state.folders.find(x => x.id === editingFolderId);
    f.name = name; f.icon = icon;
  } else {
    state.folders.push({ id: uid(), name, icon, collapsed: false, bookmarks: [] });
  }
  save(); closeModal('folderModal'); render();
  toast(editingFolderId ? '已更新' : '已新增');
}

function deleteFolder(id) {
  const f = state.folders.find(x => x.id === id);
  if (!confirm(`確定刪除資料夾「${f.name}」？\n內含 ${f.bookmarks.length} 個書籤也會一起刪除。`)) return;
  state.folders = state.folders.filter(x => x.id !== id);
  save(); render(); toast('已刪除');
}

// ====== Bookmark actions ======
function openBookmarkModal(folderId, bookmarkId = null) {
  editingBookmark = bookmarkId ? { folderId, bookmarkId } : { folderId, bookmarkId: null };
  const sel = document.getElementById('bFolder');
  sel.innerHTML = state.folders.map(f => `<option value="${f.id}">${escape(f.icon||'📁')} ${escape(f.name)}</option>`).join('');
  sel.value = folderId;

  document.getElementById('bookmarkModalTitle').textContent = bookmarkId ? '編輯書籤' : '新增書籤';
  document.getElementById('bDeleteBtn').style.display = bookmarkId ? '' : 'none';

  if (bookmarkId) {
    const f = state.folders.find(x => x.id === folderId);
    const b = f.bookmarks.find(x => x.id === bookmarkId);
    document.getElementById('bTitle').value = b.title;
    document.getElementById('bUrl').value = b.url;
    document.getElementById('bNote').value = b.note || '';
  } else {
    document.getElementById('bTitle').value = '';
    document.getElementById('bUrl').value = 'https://';
    document.getElementById('bNote').value = '';
  }
  document.getElementById('bookmarkModal').classList.add('show');
  setTimeout(() => document.getElementById('bTitle').focus(), 50);
}

function saveBookmark() {
  const title = document.getElementById('bTitle').value.trim();
  let url = document.getElementById('bUrl').value.trim();
  const note = document.getElementById('bNote').value.trim();
  const newFolderId = document.getElementById('bFolder').value;
  if (!title || !url) { toast('請填寫標題與網址'); return; }
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

  if (editingBookmark.bookmarkId) {
    const oldFolder = state.folders.find(f => f.id === editingBookmark.folderId);
    const bm = oldFolder.bookmarks.find(b => b.id === editingBookmark.bookmarkId);
    bm.title = title; bm.url = url; bm.note = note;
    if (newFolderId !== editingBookmark.folderId) {
      oldFolder.bookmarks = oldFolder.bookmarks.filter(b => b.id !== editingBookmark.bookmarkId);
      const nf = state.folders.find(f => f.id === newFolderId);
      nf.bookmarks.push(bm);
    }
  } else {
    const f = state.folders.find(x => x.id === newFolderId);
    f.bookmarks.push({ id: uid(), title, url, note });
  }
  save(); closeModal('bookmarkModal'); render();
  toast(editingBookmark.bookmarkId ? '已更新' : '已新增');
}

function deleteBookmark(folderId, bookmarkId) {
  if (editingBookmark && !bookmarkId) {
    folderId = editingBookmark.folderId;
    bookmarkId = editingBookmark.bookmarkId;
  }
  if (!confirm('確定刪除此書籤？')) return;
  const f = state.folders.find(x => x.id === folderId);
  f.bookmarks = f.bookmarks.filter(b => b.id !== bookmarkId);
  save(); closeModal('bookmarkModal'); render(); toast('已刪除');
}

// ====== Import/Export ======
function exportJSON() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `bookmarks-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('已匯出');
}

function importJSON() {
  const input = document.getElementById('fileInput');
  input.value = ''; input.accept = '.json,.html';
  input.onchange = async e => {
    const file = e.target.files[0]; if (!file) return;
    const text = await file.text();
    if (file.name.endsWith('.json')) {
      try {
        const data = JSON.parse(text);
        if (!data.folders) throw new Error('格式錯誤');
        if (!confirm(`匯入將取代目前 ${state.folders.length} 個資料夾。確定？`)) return;
        state = data; save(); render(); toast('已匯入 JSON');
      } catch(err) { toast('JSON 解析失敗：' + err.message); }
    } else {
      parseBrowserBookmarks(text);
    }
  };
  input.click();
}

function importBrowser() {
  const input = document.getElementById('fileInput');
  input.value = ''; input.accept = '.html';
  input.onchange = async e => {
    const file = e.target.files[0]; if (!file) return;
    const text = await file.text();
    parseBrowserBookmarks(text);
  };
  input.click();
}

function parseBrowserBookmarks(html) {
  try {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const h3s = Array.from(doc.querySelectorAll('H3'));
    const folders = [];
    h3s.forEach(h3 => {
      const list = h3.nextElementSibling;
      if (!list || list.tagName !== 'DL') return;
      const bms = [];
      list.querySelectorAll(':scope > DT > A').forEach(a => {
        bms.push({ id: uid(), title: a.textContent.trim(), url: a.getAttribute('HREF') || '', note: '' });
      });
      if (bms.length) {
        folders.push({ id: uid(), name: h3.textContent.trim(), icon: '📁', collapsed: false, bookmarks: bms });
      }
    });
    if (folders.length === 0) { toast('沒有找到書籤資料夾'); return; }
    const mode = confirm(`找到 ${folders.length} 個資料夾、共 ${folders.reduce((s,f)=>s+f.bookmarks.length,0)} 個書籤。\n\n確定=附加到目前書籤\n取消=取代目前書籤`);
    if (mode) state.folders = state.folders.concat(folders);
    else state.folders = folders;
    save(); render(); toast('已匯入瀏覽器書籤');
  } catch(e) { toast('解析失敗：' + e.message); }
}

// ====== Utilities ======
function closeModal(id){ document.getElementById(id).classList.remove('show'); }
function escape(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 1800);
}

// ====== Init ======
document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value; render();
});
document.querySelectorAll('.modal-bg').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('show'); });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-bg.show').forEach(m => m.classList.remove('show'));
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('search').focus(); }
});

load();
render();
</script>
